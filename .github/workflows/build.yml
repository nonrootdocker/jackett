name: Build SABnzbd Image

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v10

      - name: Setup cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Build image
        run: nix build .#sabnzbd-image
